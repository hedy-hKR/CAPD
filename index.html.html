        body { font-family: 'IBM Plex Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        [dir="rtl"] { font-family: 'IBM Plex Sans Arabic', Tahoma, Arial, sans-serif; }
        
        @media print {
            @page { size: A4; margin: 10mm; }
            html, body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                background-color: #ffffff !important;
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            header, nav { display: none !important; }

        const loadLocal = (key, defaultVal) => { try { const saved = localStorage.getItem(key); return saved ? JSON.parse(saved) : defaultVal; } catch (e) { return defaultVal; } };

        const safeSetLocal = (key, dataStr, isProfile = false) => {
            try {
                localStorage.setItem(key, dataStr);
            } catch(e) {
                if (e.name === 'QuotaExceededError' || (e.message && e.message.toLowerCase().includes('quota'))) {
                    try {
                        let parsed = JSON.parse(dataStr);
                        if (isProfile || key.startsWith('profile_')) {
                            parsed.avatar = ""; 
                            localStorage.setItem(key, JSON.stringify(parsed));
                            alert("⚠️ Storage Full. Avatar was removed to free space. Please re-upload a smaller photo.");
                            window.dispatchEvent(new CustomEvent('avatar-cleared'));
                        } else if (key === 'careflow_users') {
                            parsed = parsed.map(u => ({...u, avatar: ""}));
                            localStorage.setItem(key, JSON.stringify(parsed));
                            window.dispatchEvent(new CustomEvent('avatar-cleared'));
                        } else { throw e; }
                    } catch(e2) { throw e2; }
                } else { throw e; }
            }
        };

        const getSolutionColor = (sol) => {
            if (!sol) return 'bg-slate-100 text-slate-800 border-slate-300 dark:bg-slate-700 dark:text-slate-200 dark:border-slate-600';
            if (sol.includes('Yellow')) return 'bg-yellow-100 text-yellow-800 border-yellow-400 dark:bg-yellow-900/40 dark:text-yellow-300 dark:border-yellow-700';
            if (sol.includes('Green')) return 'bg-green-100 text-green-800 border-green-400 dark:bg-green-900/40 dark:text-green-300 dark:border-green-700';
            if (sol.includes('Red')) return 'bg-red-100 text-red-800 border-red-400 dark:bg-red-900/40 dark:text-red-300 dark:border-red-700';
            if (sol.includes('Purple')) return 'bg-purple-100 text-purple-800 border-purple-400 dark:bg-purple-900/40 dark:text-purple-300 dark:border-purple-700';
            return 'bg-slate-100 text-slate-800 border-slate-300 dark:bg-slate-700 dark:text-slate-200';
        };

        const calcDuration = (start, end) => {
            if(!start || !end) return null;
            let [h1, m1] = start.split(':').map(Number);
            let [h2, m2] = end.split(':').map(Number);
            let startMins = h1 * 60 + m1;
            let endMins = h2 * 60 + m2;
            if (endMins < startMins) endMins += 24 * 60; 
            let diff = endMins - startMins;
            let hrs = Math.floor(diff / 60);
            let mins = diff % 60;
            return { h: hrs, m: mins, str: `${hrs}h ${mins}m` };
        };

        const initMultiUser = () => {
            let appUsers = loadLocal('careflow_users', null);
            let active = loadLocal('careflow_active_user', null);

            if (!appUsers) {
                const oldProfile = loadLocal('dadProfile_v2', null);
                const defaultName = oldProfile && oldProfile.fullName ? oldProfile.fullName : 'Patient 1';
                appUsers = [{ id: 'default', name: defaultName, avatar: oldProfile?.avatar || '' }];
                active = 'default';

                if (oldProfile) {
                    if (oldProfile.doctorName && typeof oldProfile.doctorName === 'string') {
                        oldProfile.doctors = [{ id: Date.now(), name: oldProfile.doctorName, role: 'Primary' }];
                        delete oldProfile.doctorName;
                    } else if (!oldProfile.doctors) { oldProfile.doctors = []; }
                    safeSetLocal('profile_default', JSON.stringify(oldProfile));
                }
                
                safeSetLocal('careflow_users', JSON.stringify(appUsers));
                safeSetLocal('careflow_active_user', active);

                const oldCapd = localStorage.getItem('dadCapd_v2'); if(oldCapd) safeSetLocal('capd_default', oldCapd);
                const oldVitals = localStorage.getItem('dadVitals_v2'); if(oldVitals) safeSetLocal('vitals_default', oldVitals);
                const oldMeds = localStorage.getItem('dadMeds_v2'); if(oldMeds) safeSetLocal('meds_default', oldMeds);
                const oldTests = localStorage.getItem('dadTests_v2'); if(oldTests) safeSetLocal('tests_default', oldTests);
            }
            return { appUsers, active };
        };

        function App() {
            const [lang, setLang] = useState(() => localStorage.getItem('appLang') || 'en');
            const [darkMode, setDarkMode] = useState(() => loadLocal('appDarkMode', false));
            const [autoTime, setAutoTime] = useState(() => loadLocal('appAutoTime', true));

            useEffect(() => { localStorage.setItem('appLang', lang); }, [lang]);
            useEffect(() => { localStorage.setItem('appAutoTime', JSON.stringify(autoTime)); }, [autoTime]);
            useEffect(() => { 
                localStorage.setItem('appDarkMode', JSON.stringify(darkMode)); 
                if(darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            const isRtl = lang === 'ar' || lang === 'ku_sorani';
            const t = (key) => dict[key] ? dict[key][lang] : key;

            const [activeTab, setActiveTab] = useState('dashboard');
            const [reportPeriod, setReportPeriod] = useState(7);
            const [historyPeriod, setHistoryPeriod] = useState('all'); 
            const todayStr = new Date().toISOString().split('T')[0];
            const [showSuccess, setShowSuccess] = useState('');
            const [editingRecord, setEditingRecord] = useState(null); 

            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showRecentActivity, setShowRecentActivity] = useState(true);
            const [showNextExchangeModal, setShowNextExchangeModal] = useState(false);
            const [notifPermission, setNotifPermission] = useState(window.Notification ? Notification.permission : 'default');

            const [soundType, setSoundType] = useState(() => loadLocal('appSoundType', 'bell'));
            const [customSoundUrl, setCustomSoundUrl] = useState(() => loadLocal('appCustomSound', ''));

            const { appUsers: initialUsers, active: initialActive } = useMemo(initMultiUser, []);
            const [users, setUsers] = useState(initialUsers);
            const [activeUserId, setActiveUserId] = useState(initialActive);
            const activeUserIdRef = useRef(activeUserId);
            const [showUserModal, setShowUserModal] = useState(false);
            const [newUserForm, setNewUserForm] = useState('');

            const defaultProfile = { fullName: '', dob: '', bloodGroup: '', phone: '', address: '', doctors: [], medicalNotes: '', avatar: '' };
            const [profile, setProfile] = useState(() => loadLocal(`profile_${initialActive}`, defaultProfile));
            const [capdLogs, setCapdLogs] = useState(() => loadLocal(`capd_${initialActive}`, []));
            const [vitalLogs, setVitalLogs] = useState(() => loadLocal(`vitals_${initialActive}`, []));
            const [medLogs, setMedLogs] = useState(() => loadLocal(`meds_${initialActive}`, []));
            const [testLogs, setTestLogs] = useState(() => loadLocal(`tests_${initialActive}`, []));
            const [customNextExchange, setCustomNextExchange] = useState(() => loadLocal(`nextexchange_${initialActive}`, null));
            const [creatorInfo, setCreatorInfo] = useState(() => loadLocal('careflow_creator', { name: '', contact: '' }));

            useEffect(() => { 
                safeSetLocal(`profile_${activeUserIdRef.current}`, JSON.stringify(profile), true); 
                setUsers(prev => {
                    const updated = prev.map(u => u.id === activeUserIdRef.current ? { ...u, name: profile.fullName || 'Patient', avatar: profile.avatar } : u);
                    safeSetLocal('careflow_users', JSON.stringify(updated));
                    return updated;
                });
            }, [profile]);
            useEffect(() => { safeSetLocal(`capd_${activeUserIdRef.current}`, JSON.stringify(capdLogs)); }, [capdLogs]);
            useEffect(() => { safeSetLocal(`vitals_${activeUserIdRef.current}`, JSON.stringify(vitalLogs)); }, [vitalLogs]);
            useEffect(() => { safeSetLocal(`meds_${activeUserIdRef.current}`, JSON.stringify(medLogs)); }, [medLogs]);
            useEffect(() => { safeSetLocal(`tests_${activeUserIdRef.current}`, JSON.stringify(testLogs)); }, [testLogs]);
            useEffect(() => { safeSetLocal(`nextexchange_${activeUserIdRef.current}`, JSON.stringify(customNextExchange)); }, [customNextExchange]);
            useEffect(() => { safeSetLocal('careflow_creator', JSON.stringify(creatorInfo)); }, [creatorInfo]);
            useEffect(() => { safeSetLocal('appSoundType', JSON.stringify(soundType)); }, [soundType]);
            useEffect(() => { safeSetLocal('appCustomSound', JSON.stringify(customSoundUrl)); }, [customSoundUrl]);

            const [capdForm, setCapdForm] = useState({ date: todayStr, time: '', drainTime: '', solution: 'Dianeal 1.5% (Yellow)', inflow: 2000, outflow: '', appearance: 'Clear', heparin: false });
            const [vitalForm, setVitalForm] = useState({ date: todayStr, time: '', sys: '', dia: '', sugar: '', weight: '' });
            const [medForm, setMedForm] = useState({ date: todayStr, time: '', timeOfDay: 'Morning', type: 'Pills', name: '' });
            const [testForm, setTestForm] = useState({ date: todayStr, name: '', result: '' });
            const [nextExForm, setNextExForm] = useState({ date: todayStr, time: '' });

            const playNotificationSound = () => {
                if (soundType === 'custom' && customSoundUrl) {
                    const audio = new Audio(customSoundUrl);
                    audio.play().catch(e => console.error("Audio playback blocked:", e));
                    return;
                }
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    if (soundType === 'bell' || soundType === 'default') {
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                        gainNode.gain.setValueAtTime(1, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 1);
                    } else if (soundType === 'chime') {
                        oscillator.type = 'triangle';
                        oscillator.frequency.setValueAtTime(1046.50, ctx.currentTime);
                        oscillator.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.8);
                    } else if (soundType === 'alarm') {
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(440, ctx.currentTime);
                        gainNode.gain.setValueAtTime(1, ctx.currentTime);
                        gainNode.gain.setValueAtTime(0, ctx.currentTime + 0.1);
                        gainNode.gain.setValueAtTime(1, ctx.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(1, ctx.currentTime + 0.4);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 1);
                    }
                } catch (e) { console.error("Audio playback error:", e); }
            };

            const requestNotificationPermission = () => {
                if (!("Notification" in window)) {
                    alert("⚠️ Your browser does not support notifications. On iPhone, tap 'Share' → 'Add to Home Screen' first.");
                    return;
                }
                Notification.requestPermission().then(permission => {
                    setNotifPermission(permission);
                    if (permission === 'granted') {
                        triggerSuccess(t('notifEnabled'));
                        playNotificationSound();
                        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                            navigator.serviceWorker.ready.then(reg => {
                                reg.showNotification(t('appTitle'), { body: t('notifEnabled'), icon: 'https://cdn-icons-png.flaticon.com/512/2966/2966327.png' });
                            });
                        } else {
                            new Notification(t('appTitle'), { body: t('notifEnabled'), icon: 'https://cdn-icons-png.flaticon.com/512/2966/2966327.png' });
                        }
                    }
                });
            };

            const handleCustomSoundUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2000000) { alert("File too large! Max 2MB."); return; }
                const reader = new FileReader();
                reader.onload = (event) => { setCustomSoundUrl(event.target.result); setSoundType('custom'); };
                reader.readAsDataURL(file);
            };

            useEffect(() => {
                const handleAvatarClear = () => {
                    setProfile(prev => ({ ...prev, avatar: '' }));
                    setUsers(prev => prev.map(u => u.id === activeUserIdRef.current ? { ...u, avatar: '' } : u));
                };
                window.addEventListener('avatar-cleared', handleAvatarClear);
                return () => window.removeEventListener('avatar-cleared', handleAvatarClear);
            }, []);

            useEffect(() => {
                if(editingRecord || !autoTime) return; 
                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                setCapdForm(prev => ({ ...prev, time: timeString, drainTime: timeString }));
                setVitalForm(prev => ({ ...prev, time: timeString }));
            }, [activeTab, autoTime]);

            const triggerSuccess = (msg) => { setShowSuccess(msg || t('savedMsg')); setTimeout(() => setShowSuccess(''), 2500); };

            const handleSwitchUser = (id) => {
                if(activeUserId === id) return;
                setActiveUserId(id);
                activeUserIdRef.current = id;
                safeSetLocal('careflow_active_user', id);
                setProfile(loadLocal(`profile_${id}`, defaultProfile));
                setCapdLogs(loadLocal(`capd_${id}`, []));
                setVitalLogs(loadLocal(`vitals_${id}`, []));
                setMedLogs(loadLocal(`meds_${id}`, []));
                setTestLogs(loadLocal(`tests_${id}`, []));
                setCustomNextExchange(loadLocal(`nextexchange_${id}`, null));
                setShowUserModal(false);
                triggerSuccess(t('switchedMsg'));
            };

            const handleAddUser = (e) => {
                e.preventDefault();
                if(!newUserForm.trim()) return;
                const newId = 'user_' + Date.now();
                const newUser = { id: newId, name: newUserForm, avatar: '' };
                const updatedUsers = [...users, newUser];
                setUsers(updatedUsers);
                safeSetLocal('careflow_users', JSON.stringify(updatedUsers));
                setNewUserForm('');
                handleSwitchUser(newId);
            };

            const handleDeleteUser = (id) => {
                if (users.length <= 1) { alert(t('cannotDeleteLast')); return; }
                if (window.confirm(t('deletePatientConfirm'))) {
                    const updatedUsers = users.filter(u => u.id !== id);
                    setUsers(updatedUsers);
                    safeSetLocal('careflow_users', JSON.stringify(updatedUsers));
                    localStorage.removeItem(`profile_${id}`);
                    localStorage.removeItem(`capd_${id}`);
                    localStorage.removeItem(`vitals_${id}`);
                    localStorage.removeItem(`meds_${id}`);
                    localStorage.removeItem(`tests_${id}`);
                    if (activeUserId === id) { handleSwitchUser(updatedUsers[0].id); }
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 250, MAX_HEIGHT = 250;
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        setProfile(prev => ({...prev, avatar: compressedDataUrl}));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleCapdSubmit = (e) => {
                e.preventDefault();
                const uf = Number(capdForm.outflow) - Number(capdForm.inflow);
                setCapdLogs([...capdLogs, { id: Date.now(), ...capdForm, inflow: Number(capdForm.inflow), outflow: Number(capdForm.outflow), uf }]);
                setCapdForm({ ...capdForm, outflow: '', appearance: 'Clear', heparin: false });
                setCustomNextExchange(null); 
                triggerSuccess();
            };
            const handleProfileSubmit = (e) => { e.preventDefault(); triggerSuccess(t('btnProf')); };
            const handleVitalSubmit = (e) => {
                e.preventDefault();
                setVitalLogs([...vitalLogs, { id: Date.now(), ...vitalForm }]);
                setVitalForm({ ...vitalForm, sys: '', dia: '', sugar: '', weight: '' });
                triggerSuccess();
            };
            const handleMedSubmit = (e) => {
                e.preventDefault();
                setMedLogs([...medLogs, { id: Date.now(), ...medForm }]);
                setMedForm({ ...medForm, name: '', time: '' });
                triggerSuccess();
            };
            const handleTestSubmit = (e) => {
                e.preventDefault();
                setTestLogs([...testLogs, { id: Date.now(), ...testForm }]);
                setTestForm({ ...testForm, name: '', result: '' });
                triggerSuccess();
            };

            const addDoctor = () => {
                const newDocs = [...(profile.doctors || []), { id: Date.now(), name: '', role: '' }];
                setProfile({...profile, doctors: newDocs});
            };
            const updateDoctor = (id, field, val) => setProfile({...profile, doctors: profile.doctors.map(d => d.id === id ? {...d, [field]: val} : d)});
            const removeDoctor = (id) => setProfile({...profile, doctors: profile.doctors.filter(d => d.id !== id)});

            const handleSaveEdit = (e) => {
                e.preventDefault();
                const type = editingRecord.type;
                const data = { ...editingRecord.data };
                if (type === 'capd') {
                    data.inflow = Number(data.inflow); data.outflow = Number(data.outflow); data.uf = data.outflow - data.inflow;
                    setCapdLogs(capdLogs.map(l => l.id === data.id ? data : l));
                    setCustomNextExchange(null); 
                } else if (type === 'vitals') setVitalLogs(vitalLogs.map(l => l.id === data.id ? data : l));
                else if (type === 'meds') setMedLogs(medLogs.map(l => l.id === data.id ? data : l));
                else if (type === 'tests') setTestLogs(testLogs.map(l => l.id === data.id ? data : l));
                setEditingRecord(null); triggerSuccess();
            };

            const deleteLog = (type, id) => {
                if(window.confirm(t('deleteRecordConfirm'))) {
                    if(type === 'capd') { setCapdLogs(capdLogs.filter(l => l.id !== id)); setCustomNextExchange(null); }
                    if(type === 'vitals') setVitalLogs(vitalLogs.filter(l => l.id !== id));
                    if(type === 'meds') setMedLogs(medLogs.filter(l => l.id !== id));
                    if(type === 'tests') setTestLogs(testLogs.filter(l => l.id !== id));
                    if (editingRecord && editingRecord.data.id === id) setEditingRecord(null);
                }
            };

            const handleClearPatientData = () => {
                if(window.confirm(t('deletePatientConfirm'))) {
                    setCapdLogs([]); setVitalLogs([]); setMedLogs([]); setTestLogs([]); setCustomNextExchange(null);
                    triggerSuccess(); setShowSettingsModal(false);
                }
            };

            const handleExportJson = () => {
                const allData = { users, activeUserId, profiles: {}, capd: {}, vitals: {}, meds: {}, tests: {} };
                users.forEach(u => {
                    allData.profiles[u.id] = loadLocal(`profile_${u.id}`, defaultProfile);
                    allData.capd[u.id] = loadLocal(`capd_${u.id}`, []);
                    allData.vitals[u.id] = loadLocal(`vitals_${u.id}`, []);
                    allData.meds[u.id] = loadLocal(`meds_${u.id}`, []);
                    allData.tests[u.id] = loadLocal(`tests_${u.id}`, []);
                });
                const blob = new Blob([JSON.stringify(allData)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a"); link.href = url; link.download = `CareFlow_SyncDatabase_${todayStr}.json`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleImportJson = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    let importedData;
                    try { importedData = JSON.parse(event.target.result); } 
                    catch (err) {
                        try {
                            let text = event.target.result.trim();
                            if(text.endsWith(',')) text = text.slice(0, -1);
                            if(!text.endsWith('}')) text += '}';
                            importedData = JSON.parse(text);
                        } catch(err2) { alert(`File Error: ${err.message}`); return; }
                    }
                    try {
                        if (importedData.users && importedData.profiles) {
                            safeSetLocal('careflow_users', JSON.stringify(importedData.users));
                            safeSetLocal('careflow_active_user', importedData.activeUserId || importedData.users[0].id);
                            importedData.users.forEach(u => {
                                safeSetLocal(`profile_${u.id}`, JSON.stringify(importedData.profiles[u.id] || {}), true);
                                safeSetLocal(`capd_${u.id}`, JSON.stringify(importedData.capd[u.id] || []));
                                safeSetLocal(`vitals_${u.id}`, JSON.stringify(importedData.vitals[u.id] || []));
                                safeSetLocal(`meds_${u.id}`, JSON.stringify(importedData.meds[u.id] || []));
                                safeSetLocal(`tests_${u.id}`, JSON.stringify(importedData.tests[u.id] || []));
                            });
                            setUsers(importedData.users);
                            const active = importedData.activeUserId || importedData.users[0].id;
                            setActiveUserId(active); activeUserIdRef.current = active;
                            setProfile(importedData.profiles[active] || defaultProfile);
                            setCapdLogs(importedData.capd[active] || []); setVitalLogs(importedData.vitals[active] || []);
                            setMedLogs(importedData.meds[active] || []); setTestLogs(importedData.tests[active] || []);
                            triggerSuccess("Database Restored!"); setShowSettingsModal(false);
                        } else { alert("Invalid File Format."); }
                    } catch (err) { console.error(err); alert("Storage Error: " + err.message); }
                };
                reader.readAsText(file); e.target.value = null; 
            };

            const sortedCapd = [...capdLogs].sort((a,b) => new Date(b.date+'T'+b.time) - new Date(a.date+'T'+a.time));
            
            const latestSugarLog = useMemo(() => {
                const logsWithSugar = vitalLogs.filter(l => l.sugar);
                if(logsWithSugar.length === 0) return null;
                return [...logsWithSugar].sort((a,b) => new Date(b.date+'T'+(b.time||'00:00')) - new Date(a.date+'T'+(a.time||'00:00')))[0];
            }, [vitalLogs]);
            
            const latestBpLog = useMemo(() => {
                const logsWithBp = vitalLogs.filter(l => l.sys && l.dia);
                if(logsWithBp.length === 0) return null;
                return [...logsWithBp].sort((a,b) => new Date(b.date+'T'+(b.time||'00:00')) - new Date(a.date+'T'+(a.time||'00:00')))[0];
            }, [vitalLogs]);

            const todaysCapd = capdLogs.filter(log => log.date === todayStr);
            const totalDailyUF = todaysCapd.reduce((sum, log) => sum + log.uf, 0);
            
            const recentActivity = useMemo(() => {
                const combined = [
                    ...capdLogs.map(l => ({ ...l, typeLabel: 'CAPD', icon: <Icons.Droplets c="h-4 w-4 text-blue-500" /> })),
                    ...medLogs.map(l => ({ ...l, typeLabel: 'Med/Inj', icon: <Icons.Pill c="h-4 w-4 text-purple-500" /> }))
                ].sort((a,b) => new Date(b.date+'T'+(b.time||'00:00')) - new Date(a.date+'T'+(a.time||'00:00')));
                return combined.slice(0, 5);
            }, [capdLogs, medLogs]);

            const nextExchangeInfo = useMemo(() => {
                if (customNextExchange) {
                    return { date: customNextExchange.date, time: customNextExchange.time, type: 'Custom' };
                }
                if (sortedCapd.length > 0) {
                    const last = sortedCapd[0];
                    const lastTimeStr = last.drainTime || last.time;
                    if (lastTimeStr) {
                        let d = new Date(`${last.date}T${lastTimeStr}`);
                        let hrsToAdd = last.solution.includes('Extraneal') ? 12 : 4;
                        d.setHours(d.getHours() + hrsToAdd);
                        return { 
                            date: d.toISOString().split('T')[0], 
                            time: d.toTimeString().substring(0, 5),
                            type: hrsToAdd === 12 ? 'Extraneal (12 hrs)' : 'Dianeal (4 hrs)'
                        };
                    }
                }
                return null;
            }, [sortedCapd, customNextExchange]);

            useEffect(() => {
                if (!nextExchangeInfo) return;
                const interval = setInterval(() => {
                    const now = new Date();
                    const targetTime = new Date(`${nextExchangeInfo.date}T${nextExchangeInfo.time}`).getTime();
                    const currentTime = now.getTime();
                    const currentKey = `${nextExchangeInfo.date}-${nextExchangeInfo.time}`;
                    const lastNotif = localStorage.getItem('lastNotifKey');
                    if (currentTime >= targetTime && lastNotif !== currentKey) {
                        localStorage.setItem('lastNotifKey', currentKey);
                        playNotificationSound();
                        if ("Notification" in window && Notification.permission === "granted") {
                            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                                navigator.serviceWorker.ready.then(reg => {
                                    reg.showNotification(t('appTitle'), { body: `${t('nextExchange')}: ${nextExchangeInfo.type}`, icon: 'https://cdn-icons-png.flaticon.com/512/2966/2966327.png', vibrate: [200, 100, 200] });
                                });
                            } else {
                                new Notification(t('appTitle'), { body: `${t('nextExchange')}: ${nextExchangeInfo.type}`, icon: 'https://cdn-icons-png.flaticon.com/512/2966/2966327.png' });
                            }
                        } else {
                            triggerSuccess(`⏰ ${t('nextExchange')}: ${nextExchangeInfo.time}`);
                        }
                    }
                }, 5000); 
                return () => clearInterval(interval);
            }, [nextExchangeInfo, lang, soundType, customSoundUrl]);

            const openBellModal = () => {
                if (nextExchangeInfo) setNextExForm({ date: nextExchangeInfo.date, time: nextExchangeInfo.time });
                else setNextExForm({ date: todayStr, time: new Date().toTimeString().substring(0, 5) });
                setShowNextExchangeModal(true);
            };

            const openSettingsModal = () => {
                if (nextExchangeInfo) setNextExForm({ date: nextExchangeInfo.date, time: nextExchangeInfo.time });
                else setNextExForm({ date: todayStr, time: new Date().toTimeString().substring(0, 5) });
                setShowSettingsModal(true);
            };

            const reportData = useMemo(() => {
                let pCapd = capdLogs; let pVitals = vitalLogs;
                if (reportPeriod !== 'all') {
                    const targetDate = new Date(); targetDate.setDate(targetDate.getDate() - reportPeriod);
                    const targetStr = targetDate.toISOString().split('T')[0];
                    pCapd = capdLogs.filter(l => l.date >= targetStr);
                    pVitals = vitalLogs.filter(l => l.date >= targetStr);
                }
                const solutions = { 'Dianeal 1.5% (Yellow)': { bags: 0, ml: 0 }, 'Dianeal 2.5% (Green)': { bags: 0, ml: 0 }, 'Dianeal 4.25% (Red)': { bags: 0, ml: 0 }, 'Extraneal (Purple)': { bags: 0, ml: 0 } };
                let totalPeriodUf = 0; let sysSum = 0, diaSum = 0, sugSum = 0, bpCount = 0, sugCount = 0;
                pCapd.forEach(l => { 
                    if (solutions[l.solution] !== undefined) { solutions[l.solution].bags += 1; solutions[l.solution].ml += Number(l.inflow || 0); }
                    totalPeriodUf += Number(l.uf || 0); 
                });
                pVitals.forEach(l => {
                    if(l.sys && l.dia) { sysSum += Number(l.sys); diaSum += Number(l.dia); bpCount++; }
                    if(l.sugar) { sugSum += Number(l.sugar); sugCount++; }
                });
                return { uf: totalPeriodUf, sys: bpCount ? Math.round(sysSum/bpCount) : '--', dia: bpCount ? Math.round(diaSum/bpCount) : '--', sugar: sugCount ? Math.round(sugSum/sugCount) : '--', solutions };
            }, [capdLogs, vitalLogs, reportPeriod]);

            const filteredHistoryLogs = useMemo(() => {
                let pCapd = capdLogs; let pVitals = vitalLogs; let pMeds = medLogs; let pTests = testLogs;
                if (historyPeriod !== 'all') {
                    const targetDate = new Date(); targetDate.setDate(targetDate.getDate() - historyPeriod);
                    const targetStr = targetDate.toISOString().split('T')[0];
                    pCapd = capdLogs.filter(l => l.date >= targetStr); pVitals = vitalLogs.filter(l => l.date >= targetStr);
                    pMeds = medLogs.filter(l => l.date >= targetStr); pTests = testLogs.filter(l => l.date >= targetStr);
                }
                return { pCapd, pVitals, pMeds, pTests };
            }, [capdLogs, vitalLogs, medLogs, testLogs, historyPeriod]);

            const historySummaryStats = useMemo(() => {
                const stats = { 'Dianeal 1.5% (Yellow)': { bags: 0, in: 0, out: 0, uf: 0 }, 'Dianeal 2.5% (Green)': { bags: 0, in: 0, out: 0, uf: 0 }, 'Dianeal 4.25% (Red)': { bags: 0, in: 0, out: 0, uf: 0 }, 'Extraneal (Purple)': { bags: 0, in: 0, out: 0, uf: 0 } };
                filteredHistoryLogs.pCapd.forEach(l => {
                    const sol = l.solution;
                    if (stats[sol]) { stats[sol].bags += 1; stats[sol].in += Number(l.inflow || 0); stats[sol].out += Number(l.outflow || 0); stats[sol].uf += Number(l.uf || 0); }
                });
                return stats;
            }, [filteredHistoryLogs.pCapd]);

            const exportData = () => {
                const activeUserName = profile.fullName || 'Patient';
                let csv = `data:text/csv;charset=utf-8,--- CAREFLOW EXPORT FOR ${activeUserName.toUpperCase()} ---\n\n--- CAPD EXCHANGES ---\nDate,Fill Time,Drain Time,Solution,Inflow(ml),Outflow(ml),UF(ml),Appearance,Heparin\n`;
                capdLogs.forEach(l => { csv += `${l.date},${l.time},${l.drainTime||'--'},${l.solution},${l.inflow},${l.outflow},${l.uf},${l.appearance},${l.heparin?'Yes':'No'}\n`; });
                csv += "\n--- VITALS ---\nDate,Time,BP,Sugar,Weight\n";
                vitalLogs.forEach(l => { csv += `${l.date},${l.time},${l.sys}/${l.dia},${l.sugar},${l.weight}\n`; });
                csv += "\n--- MEDS/INJECTIONS ---\nDate,Time,Time of Day,Type,Name\n";
                medLogs.forEach(l => { csv += `${l.date},${l.time},${l.timeOfDay||'--'},${l.type},${l.name}\n`; });
                csv += "\n--- LAB TESTS ---\nDate,Test Name,Result/Notes\n";
                testLogs.forEach(l => { csv += `${l.date},${l.name},${l.result}\n`; });
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", `CareFlow_${activeUserName.replace(/\s+/g, '_')}_${todayStr}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const sortedCapdHistory = [...filteredHistoryLogs.pCapd].sort((a,b) => new Date(b.date+'T'+b.time) - new Date(a.date+'T'+a.time));
            const sortedVitalsHistory = [...filteredHistoryLogs.pVitals].sort((a,b) => new Date(b.date+'T'+b.time) - new Date(a.date+'T'+a.time));
            const sortedMedsHistory = [...filteredHistoryLogs.pMeds].sort((a,b) => new Date(b.date+'T'+(b.time||'00:00')) - new Date(a.date+'T'+(a.time||'00:00')));
            const sortedTestsHistory = [...filteredHistoryLogs.pTests].sort((a,b) => new Date(b.date) - new Date(a.date));

            return (
                <div dir={isRtl ? 'rtl' : 'ltr'} className="min-h-screen pb-24 font-sans bg-slate-50 dark:bg-slate-900 transition-colors">
                    
                    {/* Header */}
                    <header className="bg-slate-800 dark:bg-slate-950 text-white p-3 md:p-4 shadow-md sticky top-0 z-20 flex justify-between items-center no-print border-b border-slate-700">
                        <button onClick={() => setShowUserModal(true)} className="flex items-center gap-2 overflow-hidden hover:bg-slate-700 dark:hover:bg-slate-800 px-2 py-1.5 rounded-lg transition text-left max-w-[50%]">
                            {profile.avatar ? (
                                <img src={profile.avatar} className="h-8 w-8 rounded-full object-cover border-2 border-slate-500 shrink-0" alt="Profile" />
                            ) : (
                                <div className="h-8 w-8 rounded-full bg-slate-600 flex items-center justify-center border-2 border-slate-500 shrink-0"><Icons.User c="h-5 w-5" /></div>
                            )}
                            <div className="flex flex-col overflow-hidden text-start">
                                <h1 className="text-sm font-bold truncate leading-tight flex items-center gap-1">
                                    {profile.fullName ? profile.fullName.split(' ')[0] : 'Patient'} <Icons.ChevronDown c="h-3 w-3 opacity-70" />
                                </h1>
                                <span className="text-[10px] text-slate-300 dark:text-slate-400">{t('appTitle')}</span>
                            </div>
                        </button>
                        
                        <div className="flex items-center shrink-0">
                            <button onClick={() => window.print()} className="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-lg transition me-1 shadow-sm flex items-center gap-1 font-bold text-xs" title="Print">
                                <Icons.Printer c="h-4 w-4" /> <span className="hidden sm:inline">{t('printBtn')}</span>
                            </button>
                            <button onClick={openBellModal} className="bg-slate-700 dark:bg-slate-800 p-2 rounded-lg hover:bg-slate-600 transition mx-1 relative">
                                <Icons.Bell c="h-4 w-4 text-amber-300" />
                                {nextExchangeInfo && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>}
                            </button>
                            <button onClick={() => setDarkMode(!darkMode)} className="bg-slate-700 dark:bg-slate-800 p-2 rounded-lg hover:bg-slate-600 transition mx-1">
                                {darkMode ? <Icons.Sun c="h-4 w-4 text-amber-300" /> : <Icons.Moon c="h-4 w-4 text-blue-200" />}
                            </button>
                            <button onClick={openSettingsModal} className="bg-slate-700 dark:bg-slate-800 p-2 rounded-lg hover:bg-slate-600 transition">
                                <Icons.Settings c="h-4 w-4 text-slate-200" />
                            </button>
                        </div>
                    </header>

                    {showSuccess && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-emerald-600 text-white px-5 py-2.5 rounded-full shadow-lg flex items-center gap-2 z-50 font-bold no-print whitespace-nowrap">
                            <Icons.Check c="h-5 w-5" /> {showSuccess}
                        </div>
                    )}

                    {/* NEXT EXCHANGE MODAL */}
                    {showNextExchangeModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 no-print" dir={isRtl ? 'rtl' : 'ltr'} onClick={() => setShowNextExchangeModal(false)}>
                            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl shadow-2xl w-full max-w-sm p-8 relative text-white text-center" onClick={e => e.stopPropagation()}>
                                <Icons.Bell c="h-12 w-12 text-blue-200 mx-auto mb-3 opacity-80" />
                                <h3 className="text-lg font-bold mb-4">{t('nextExchange')}</h3>
                                <div className="text-6xl font-black tracking-tight mb-2 drop-shadow-md" dir="ltr">
                                    {nextExchangeInfo ? nextExchangeInfo.time : '--:--'}
                                </div>
                                {nextExchangeInfo ? (
                                    <div className="text-base font-medium text-blue-100 bg-black/20 py-2 px-4 rounded-full inline-block mt-2">
                                        {nextExchangeInfo.date === todayStr ? 'Today' : nextExchangeInfo.date} 
                                        <span className="opacity-75 ms-2" dir="ltr">({nextExchangeInfo.type})</span>
                                    </div>
                                ) : (
                                    <div className="text-sm text-blue-200 mb-4">No previous logs found.</div>
                                )}
                                {notifPermission !== 'granted' && (
                                    <button onClick={requestNotificationPermission} className="mt-6 bg-amber-400 hover:bg-amber-500 text-slate-900 w-full py-3 rounded-xl font-bold shadow-md transition flex justify-center items-center gap-2">
                                        <Icons.Bell c="h-5 w-5"/> {t('enableNotif')}
                                    </button>
                                )}
                                <button onClick={() => {setShowNextExchangeModal(false); openSettingsModal();}} className="mt-4 bg-white/20 hover:bg-white/30 transition text-white w-full py-3 rounded-xl text-sm font-bold shadow-sm flex justify-center items-center gap-2">
                                    <Icons.Settings c="h-4 w-4"/> {t('customize')}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* SETTINGS MODAL */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center p-4 z-50 no-print" dir={isRtl ? 'rtl' : 'ltr'} onClick={() => setShowSettingsModal(false)}>
                            <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto p-5 relative border border-slate-200 dark:border-slate-700" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-3">
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                                        <Icons.Settings c="h-5 w-5 text-indigo-600 dark:text-indigo-400" /> {t('settings')}
                                    </h3>
                                    <button type="button" onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><Icons.Check c="h-6 w-6" /></button>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-slate-100 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <Icons.Bell c="h-5 w-5 text-indigo-500" />
                                            <div>
                                                <h4 className="font-bold text-sm text-slate-800 dark:text-slate-200">OS Notifications</h4>
                                                <p className="text-xs text-slate-500 dark:text-slate-400">{notifPermission === 'granted' ? t('notifEnabled') : "Not Enabled"}</p>
                                            </div>
                                        </div>
                                        {notifPermission !== 'granted' && (
                                            <button type="button" onClick={requestNotificationPermission} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition">Enable</button>
                                        )}
                                    </div>
                                    <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                        <label className="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 flex items-center justify-between">
                                            <span>{t('soundSettings')} 🎵</span>
                                            <button type="button" onClick={playNotificationSound} className="text-indigo-600 dark:text-indigo-400 text-xs font-bold bg-indigo-50 dark:bg-indigo-900/30 px-2 py-1 rounded transition hover:opacity-80">{t('previewSound')}</button>
                                        </label>
                                        <select value={soundType} onChange={(e) => setSoundType(e.target.value)} className="w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 outline-none text-sm mb-2 text-slate-800 dark:text-slate-200">
                                            <option value="bell">{t('soundBell')}</option>
                                            <option value="chime">{t('soundChime')}</option>
                                            <option value="alarm">{t('soundAlarm')}</option>
                                            <option value="custom">{t('soundCustom')}</option>
                                        </select>
                                        {soundType === 'custom' && (
                                            <input type="file" accept="audio/*" onChange={handleCustomSoundUpload} className="w-full text-xs text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:border-0 file:rounded-lg file:font-bold file:bg-indigo-50 file:text-indigo-700" />
                                        )}
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 flex items-center gap-2"><Icons.Globe c="h-4 w-4" /> Language</label>
                                        <select value={lang} onChange={(e) => setLang(e.target.value)} className="w-full p-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 outline-none font-bold text-slate-800 dark:text-slate-200">
                                            <option value="en">English</option>
                                            <option value="ku_sorani">کوردی (سۆرانی)</option>
                                            <option value="ku_kurmanji">Kurdî (Kurmancî)</option>
                                            <option value="ar">العربية</option>
                                        </select>
                                    </div>

                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">Sys BP</label><input type="number" value={editingRecord.data.sys} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, sys: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" dir="ltr" /></div>
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">Dia BP</label><input type="number" value={editingRecord.data.dia} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, dia: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" dir="ltr" /></div>
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">Sugar</label><input type="number" value={editingRecord.data.sugar} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, sugar: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" dir="ltr" /></div>
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">Weight</label><input type="number" value={editingRecord.data.weight} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, weight: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" dir="ltr" /></div>
                                        </div>
                                    )}
                                    {editingRecord.type === 'meds' && (
                                        <div className="grid grid-cols-2 gap-3">
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('date')}</label><input type="date" value={editingRecord.data.date} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, date: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" /></div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('time')}</label><input type="time" value={editingRecord.data.time} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, time: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" /></div>
                                                <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('timeOfDay')}</label>
                                                    <select value={editingRecord.data.timeOfDay} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, timeOfDay: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 text-xs font-bold outline-none">
                                                        <option value="Morning">{t('morning')}</option><option value="Noon">{t('noon')}</option><option value="Evening">{t('evening')}</option><option value="Midnight">{t('midnight')}</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="col-span-2"><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('medType')}</label><select value={editingRecord.data.type} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, type: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" dir="ltr"><option value="Pills">Pills</option><option value="Insulin">Insulin</option><option value="Injection (EPO)">Injection (EPO)</option></select></div>
                                            <div className="col-span-2"><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('medName')}</label><input type="text" value={editingRecord.data.name} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, name: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" /></div>
                                        </div>
                                    )}
                                    {editingRecord.type === 'tests' && (
                                        <div className="grid grid-cols-1 gap-3">
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('date')}</label><input type="date" value={editingRecord.data.date} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, date: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" /></div>
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('testName')}</label><input type="text" value={editingRecord.data.name} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, name: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 outline-none" /></div>
                                            <div><label className="block text-xs font-bold mb-1 text-slate-700 dark:text-slate-300">{t('testResult')}</label><textarea value={editingRecord.data.result} onChange={e => setEditingRecord({...editingRecord, data: {...editingRecord.data, result: e.target.value}})} className="w-full p-2 border border-slate-300 dark:border-slate-600 rounded bg-slate-50 dark:bg-slate-900 h-20 text-slate-800 dark:text-slate-200 outline-none"></textarea></div>
                                        </div>
                                    )}
                                    <div className="flex gap-2 pt-4 border-t dark:border-slate-700 mt-4">
                                        <button type="button" onClick={() => setEditingRecord(null)} className="flex-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold py-3 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition">{t('cancel')}</button>
                                        <button type="submit" className="flex-[2] bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">{t('btnSave')}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pb-safe z-30 flex shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] no-print transition-colors">
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center py-2 px-1 flex-1 ${activeTab === 'dashboard' ? 'text-blue-700 dark:text-blue-400 border-t-2 border-blue-700 dark:border-blue-400 bg-blue-50/50 dark:bg-slate-800' : 'text-slate-500 dark:text-slate-400'}`}>
                            <Icons.Activity c="h-6 w-6 mb-1" /><span className="text-[10px] font-bold">{t('tabHome')}</span>
                        </button>
                        <button onClick={() => setActiveTab('capd')} className={`flex flex-col items-center py-2 px-1 flex-1 ${activeTab === 'capd' ? 'text-blue-700 dark:text-blue-400 border-t-2 border-blue-700 dark:border-blue-400 bg-blue-50/50 dark:bg-slate-800' : 'text-slate-500 dark:text-slate-400'}`}>
                            <Icons.Droplets c="h-6 w-6 mb-1" /><span className="text-[10px] font-bold">{t('tabCapd')}</span>
                        </button>
                        <button onClick={() => setActiveTab('vitals')} className={`flex flex-col items-center py-2 px-1 flex-1 ${activeTab === 'vitals' ? 'text-rose-600 dark:text-rose-400 border-t-2 border-rose-600 dark:border-rose-400 bg-rose-50/50 dark:bg-slate-800' : 'text-slate-500 dark:text-slate-400'}`}>
                            <Icons.Heart c="h-6 w-6 mb-1" /><span className="text-[10px] font-bold text-center leading-tight max-w-full">Meds/Tests</span>
                        </button>
                        <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center py-2 px-1 flex-1 ${activeTab === 'reports' ? 'text-indigo-600 dark:text-indigo-400 border-t-2 border-indigo-600 dark:border-indigo-400 bg-indigo-50/50 dark:bg-slate-800' : 'text-slate-500 dark:text-slate-400'}`}>
                            <Icons.PieChart c="h-6 w-6 mb-1" /><span className="text-[10px] font-bold">{t('tabReports')}</span>
                        </button>
                        <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center py-2 px-1 flex-1 ${activeTab === 'history' ? 'text-slate-800 dark:text-slate-200 border-t-2 border-slate-800 dark:border-slate-400 bg-slate-100 dark:bg-slate-800' : 'text-slate-500 dark:text-slate-400'}`}>
                            <Icons.List c="h-6 w-6 mb-1" /><span className="text-[10px] font-bold">{t('tabHistory')}</span>
                        </button>
                        <button onClick={() => setActiveTab('profile')} className={`flex flex-col items-center py-2 px-1 flex-1 ${activeTab === 'profile' ? 'text-indigo-600 dark:text-indigo-400 border-t-2 border-indigo-600 dark:border-indigo-400 bg-indigo-50/50 dark:bg-slate-800' : 'text-slate-500 dark:text-slate-400'}`}>
                            <Icons.User c="h-6 w-6 mb-1" /><span className="text-[10px] font-bold">{t('profTitle')}</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
